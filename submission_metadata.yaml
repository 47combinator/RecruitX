ai_usage_summary: |
  Used Antigravity (Gemini-based coding assistant) for architecture discussion,
  code structure, and implementation guidance. All engineering decisions,
  scoring weights, feature selection, and honeypot detection heuristics
  were designed and validated by the team. No candidate data was sent to
  any external LLM during development or ranking.

methodology_summary: |
  Hybrid retrieval + weighted ensemble ranking system. Dense retrieval
  via sentence-transformers (all-MiniLM-L6-v2) combined with BM25 sparse
  retrieval using Reciprocal Rank Fusion. 54 features across skill match,
  career relevance, behavioral signals, education, and location are combined
  via an 8-component weighted ensemble scorer. Seven heuristic checks detect
  ~80 honeypot candidates with impossible profiles. Penalty multipliers handle
  consulting-only careers and keyword stuffers. Runtime 25s for 100K on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
